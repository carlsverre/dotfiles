#:schema https://docs.jj-vcs.dev/latest/config-schema.json

[user]
name = "Carl Sverre"
email = "82591+carlsverre@users.noreply.github.com"

[ui]
default-command = "log"

[revsets]
log = "local"

[revset-aliases]
'HEAD' = '@-'
'user()' = 'user(*carl*sverre*)'
'user(x)' = 'author(x) | committer(x)'
'unpushed' = "remote_bookmarks()::"
'local' = "parents(closest_bookmark(@), 2)::@ | @::"
'closest_bookmark(to)' = 'heads(::to & bookmarks())'
'view' = "local | ::tracked_remote_bookmarks() | ::present(trunk())"
'full' = "::@ | @:: | ::bookmarks() | ::immutable_heads() | ::present(trunk())"

[aliases]
tug = ["bookmark", "move", "--from", "closest_bookmark(@-)", "--to", "@-"]
lv = ["log", "-r", "view"]
lf = ["log", "-r", "full"]

[templates]
git_push_bookmark = '"carlsverre/push-" ++ change_id.short()'
